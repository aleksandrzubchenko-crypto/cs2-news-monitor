name: CS2 news monitor
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub schedule is best-effort)
  workflow_dispatch: {}

permissions:
  contents: write            # to commit seen.json back

concurrency:
  group: fs-monitor
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run one polling cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 monitor.py --once
      - name: Persist dedupe store
        run: |
          git config user.name "cs2-monitor"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json || true
          git commit -m "update seen.json [skip ci]" || echo "nothing to commit"
          git push || echo "push skipped"
